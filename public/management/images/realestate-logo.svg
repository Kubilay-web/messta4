  <rect x="14" y="34" width="7" height="9" rx="1" fill="#60a5fa"/>
  <rect x="25" y="34" width="7" height="9" rx="1" fill="#60a5fa"/>
  <rect x="14" y="47" width="7" height="9" rx="1" fill="#60a5fa"/>
  <rect x="25" y="47" width="7" height="9" rx="1" fill="#60a5fa"/>
